services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finai
      POSTGRES_PASSWORD: finai
      POSTGRES_DB: finai
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finai"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finai:finai@db:5432/finai
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    volumes: [uploads:/data/uploads]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./backend
    command: celery -A app.services.worker.celery_app worker -l info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finai:finai@db:5432/finai
      REDIS_URL: redis://redis:6379/0
    volumes: [uploads:/data/uploads]
    depends_on: [backend]

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [backend]

volumes:
  pgdata:
  uploads:
